<!-- Notification Bell Component -->
<div class="notification-bell-container position-relative">
    <div class="notification-bell-link text-decoration-none" style="cursor: pointer;" id="notificationBellTrigger">
        <div class="notification-bell-icon position-relative">
            <i class="fas fa-bell fa-lg text-dark"></i>
            <span class="notification-badge position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" 
                  id="notification-count" style="display: none;">
                0
            </span>
        </div>
    </div>
    
    <!-- Dropdown for quick preview -->
    <div class="notification-dropdown position-absolute bg-white shadow-lg rounded border" 
         id="notification-dropdown" style="display: none; width: 380px; max-height: 500px; overflow-y: auto; z-index: 1050; top: 100%; right: 0;">
        <div class="p-3 border-bottom bg-light">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">Notifications</h5>
                <a href="{{ url_for('notification_center') }}" class="btn btn-sm btn-outline-primary rounded-pill">View All</a>
            </div>
        </div>
        <div id="notification-preview-list" style="max-height: 400px; overflow-y: auto;">
            <!-- Notifications will be loaded here -->
        </div>
    </div>
</div>

<style>
.notification-bell-container {
    cursor: pointer;
}

.notification-bell-icon {
    padding: 8px;
    border-radius: 8px;
    transition: background-color 0.3s ease;
}

.notification-bell-icon:hover {
    background-color: #f8f9fc;
}

.notification-badge {
    font-size: 0.7rem;
    min-width: 18px;
    height: 18px;
    line-height: 18px;
    padding: 0 4px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
    100% { transform: translate(-50%, -50%) scale(1); }
}

.notification-dropdown {
    margin-top: 10px;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
    border: 1px solid #e0e0e0 !important;
}

.notification-item-preview {
    padding: 16px;
    border-bottom: 1px solid #f0f0f0;
    transition: all 0.2s ease;
    cursor: pointer;
}

.notification-item-preview:hover {
    background-color: #f8f9fc;
}

.notification-item-preview:last-child {
    border-bottom: none;
}

.notification-item-preview.unread {
    background-color: #f0f7ff;
}

.notification-item-preview .notification-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 1.2rem;
}

.notification-item-preview .notification-title {
    font-weight: 600;
    font-size: 0.95rem;
    color: #333;
    margin-bottom: 4px;
}

.notification-item-preview .notification-message {
    font-size: 0.85rem;
    color: #666;
    line-height: 1.4;
    margin-bottom: 4px;
}

.notification-item-preview .notification-time {
    font-size: 0.75rem;
    color: #999;
}

.notification-item-preview .badge {
    font-size: 0.7rem;
    padding: 4px 8px;
}
</style>

<script>
// Notification Bell JavaScript
let notificationDropdownVisible = false;

document.addEventListener('DOMContentLoaded', function() {
    // Load initial notification count
    updateNotificationBell();
    
    // Set up periodic updates (every 30 seconds)
    setInterval(updateNotificationBell, 30000);
    
    // Toggle dropdown on bell click - using multiple selectors to ensure it works
    const bellTrigger = document.getElementById('notificationBellTrigger');
    const bellIcon = document.querySelector('.notification-bell-icon');
    
    if (bellTrigger) {
        bellTrigger.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggleNotificationDropdown();
        });
    }
    
    if (bellIcon) {
        bellIcon.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggleNotificationDropdown();
        });
    }
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.notification-bell-container')) {
            hideNotificationDropdown();
        }
    });
});

function updateNotificationBell() {
    fetch('/api/notifications?limit=5&unread_only=true')
        .then(response => response.json())
        .then(data => {
            const badge = document.getElementById('notification-count');
            const count = data.unread_count;
            
            if (count > 0) {
                badge.textContent = count > 99 ? '99+' : count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
            
            // Update dropdown preview
            updateNotificationPreview(data.notifications);
        })
        .catch(error => console.error('Error updating notifications:', error));
}

function toggleNotificationDropdown() {
    console.log('Toggle dropdown called'); // Debug log
    const dropdown = document.getElementById('notification-dropdown');
    
    if (!dropdown) {
        console.error('Notification dropdown not found');
        return;
    }
    
    if (notificationDropdownVisible) {
        hideNotificationDropdown();
    } else {
        showNotificationDropdown();
    }
}

function showNotificationDropdown() {
    console.log('Showing dropdown'); // Debug log
    const dropdown = document.getElementById('notification-dropdown');
    if (dropdown) {
        dropdown.style.display = 'block';
        notificationDropdownVisible = true;
        
        // Load latest notifications
        loadNotificationPreview();
    }
}

function hideNotificationDropdown() {
    console.log('Hiding dropdown'); // Debug log
    const dropdown = document.getElementById('notification-dropdown');
    if (dropdown) {
        dropdown.style.display = 'none';
        notificationDropdownVisible = false;
    }
}

function loadNotificationPreview() {
    fetch('/api/notifications?limit=5')
        .then(response => response.json())
        .then(data => {
            updateNotificationPreview(data.notifications);
        })
        .catch(error => console.error('Error loading notifications:', error));
}

function updateNotificationPreview(notifications) {
    const previewList = document.getElementById('notification-preview-list');
    
    if (notifications.length === 0) {
        previewList.innerHTML = `
            <div class="p-5 text-center text-muted">
                <i class="fas fa-bell-slash fa-3x mb-3 text-muted"></i>
                <p class="mb-0">No notifications</p>
            </div>
        `;
        return;
    }
    
    previewList.innerHTML = notifications.map(notification => {
        // Get icon based on notification type
        let iconHtml = '';
        if (notification.icon) {
            const iconClass = notification.icon;
            const colorClass = notification.color_class || 'text-primary';
            iconHtml = `<div class="notification-icon bg-light me-3"><i class="${iconClass} ${colorClass}"></i></div>`;
        } else {
            // Default icons based on title/message
            if (notification.title.includes('Order')) {
                iconHtml = '<div class="notification-icon bg-light me-3"><i class="fas fa-shopping-cart text-primary"></i></div>';
            } else if (notification.title.includes('Payment')) {
                iconHtml = '<div class="notification-icon bg-light me-3"><i class="fas fa-credit-card text-success"></i></div>';
            } else {
                iconHtml = '<div class="notification-icon bg-light me-3"><i class="fas fa-bell text-info"></i></div>';
            }
        }
        
        return `
        <div class="notification-item-preview ${!notification.is_read ? 'unread' : ''}" 
             onclick="handleNotificationClick(${notification.id}, '${notification.action_url || ''}')">
            <div class="d-flex align-items-start">
                ${iconHtml}
                <div class="flex-grow-1">
                    <div class="notification-title">${notification.title}</div>
                    <div class="notification-message">${notification.message.substring(0, 120)}${notification.message.length > 120 ? '...' : ''}</div>
                    <div class="notification-time">${formatNotificationTime(notification.created_at)}</div>
                </div>
                ${!notification.is_read ? '<div class="ms-2"><span class="badge bg-primary rounded-pill">New</span></div>' : ''}
            </div>
        </div>
    `;
    }).join('');
}

function handleNotificationClick(notificationId, actionUrl) {
    // Mark as read
    fetch(`/api/notifications/${notificationId}/read`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    }).then(() => {
        updateNotificationBell();
    });
    
    // Navigate to action URL or notification center
    if (actionUrl && actionUrl !== 'None') {
        window.location.href = actionUrl;
    } else {
        window.location.href = '/notifications';
    }
}

function markAllAsReadFromDropdown() {
    fetch('/api/notifications/mark-all-read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            updateNotificationBell();
            hideNotificationDropdown();
        }
    })
    .catch(error => console.error('Error:', error));
}

function formatNotificationTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diffInMinutes = Math.floor((now - date) / (1000 * 60));
    
    if (diffInMinutes < 1) return 'Just now';
    if (diffInMinutes < 60) return `${diffInMinutes}m ago`;
    if (diffInMinutes < 1440) return `${Math.floor(diffInMinutes / 60)}h ago`;
    if (diffInMinutes < 10080) return `${Math.floor(diffInMinutes / 1440)}d ago`;
    return date.toLocaleDateString();
}
</script>
