{% extends "base.html" %}

{% block title %}Reset Password - Daily Fitness{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="icon-circle">
                <i class="fas fa-lock"></i>
            </div>
            <h2>Set New Password</h2>
            <p>Create a strong password for your account</p>
        </div>

        <form method="POST" action="{{ url_for('reset_password_with_otp') }}" class="auth-form" id="resetForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="password-input-wrapper">
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control" 
                           placeholder="Enter new password"
                           minlength="6"
                           required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <i class="fas fa-eye" id="password-icon"></i>
                    </button>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="password-input-wrapper">
                    <input type="password" 
                           id="confirm_password" 
                           name="confirm_password" 
                           class="form-control" 
                           placeholder="Confirm new password"
                           minlength="6"
                           required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                        <i class="fas fa-eye" id="confirm_password-icon"></i>
                    </button>
                </div>
            </div>

            <div class="password-requirements">
                <p class="requirements-title">Password must contain:</p>
                <ul>
                    <li id="req-length">
                        <i class="fas fa-circle"></i> At least 6 characters
                    </li>
                    <li id="req-match">
                        <i class="fas fa-circle"></i> Passwords match
                    </li>
                </ul>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Reset Password
            </button>
        </form>
    </div>
</div>

<style>
.auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
}

.auth-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    max-width: 420px;
    width: 100%;
    padding: 40px;
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.icon-circle {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.icon-circle i {
    font-size: 28px;
    color: white;
}

.auth-header h2 {
    font-size: 28px;
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 8px;
}

.auth-header p {
    color: #718096;
    font-size: 14px;
    margin: 0;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #4a5568;
    margin-bottom: 8px;
}

.password-input-wrapper {
    position: relative;
}

.form-control {
    width: 100%;
    padding: 12px 45px 12px 16px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.2s;
}

.form-control:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #a0aec0;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
}

.toggle-password:hover {
    color: #667eea;
}

.password-strength {
    margin-top: 8px;
    height: 4px;
    background: #e2e8f0;
    border-radius: 2px;
    overflow: hidden;
}

.password-strength::after {
    content: '';
    display: block;
    height: 100%;
    width: 0;
    transition: all 0.3s;
}

.password-strength.weak::after {
    width: 33%;
    background: #f56565;
}

.password-strength.medium::after {
    width: 66%;
    background: #ed8936;
}

.password-strength.strong::after {
    width: 100%;
    background: #48bb78;
}

.password-requirements {
    background: #f7fafc;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
}

.requirements-title {
    font-size: 13px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 8px;
}

.password-requirements ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.password-requirements li {
    font-size: 13px;
    color: #718096;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.password-requirements li i {
    font-size: 8px;
}

.password-requirements li.valid {
    color: #48bb78;
}

.password-requirements li.valid i {
    color: #48bb78;
}

.btn-primary {
    width: 100%;
    padding: 14px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-primary:hover {
    background: #5568d3;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}
</style>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById(fieldId + '-icon');
    
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

// Password strength checker
const passwordInput = document.getElementById('password');
const confirmInput = document.getElementById('confirm_password');
const strengthBar = document.getElementById('passwordStrength');
const reqLength = document.getElementById('req-length');
const reqMatch = document.getElementById('req-match');

passwordInput.addEventListener('input', checkPassword);
confirmInput.addEventListener('input', checkPassword);

function checkPassword() {
    const password = passwordInput.value;
    const confirm = confirmInput.value;
    
    // Check length
    if (password.length >= 6) {
        reqLength.classList.add('valid');
    } else {
        reqLength.classList.remove('valid');
    }
    
    // Check match
    if (password && confirm && password === confirm) {
        reqMatch.classList.add('valid');
    } else {
        reqMatch.classList.remove('valid');
    }
    
    // Strength indicator
    if (password.length === 0) {
        strengthBar.className = 'password-strength';
    } else if (password.length < 6) {
        strengthBar.className = 'password-strength weak';
    } else if (password.length < 10) {
        strengthBar.className = 'password-strength medium';
    } else {
        strengthBar.className = 'password-strength strong';
    }
}

// Form validation
document.getElementById('resetForm').addEventListener('submit', function(e) {
    const password = passwordInput.value;
    const confirm = confirmInput.value;
    
    if (password !== confirm) {
        e.preventDefault();
        Swal.fire({
            icon: 'error',
            title: 'Passwords do not match',
            text: 'Please make sure both passwords are the same.'
        });
    }
});
</script>
{% endblock %}
