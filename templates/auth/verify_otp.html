<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Daily Fitness</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            overflow: hidden;
        }
        
        .video-bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
            padding: 40px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .icon-circle {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .icon-circle i {
            font-size: 28px;
            color: white;
        }
        
        .auth-header h2 {
            font-size: 28px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            color: #718096;
            font-size: 14px;
            margin: 0;
        }
        
        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
        }
        
        .otp-input {
            width: 50px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .otp-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .resend-section {
            text-align: center;
            margin: 20px 0;
            padding: 20px 0;
            border-top: 1px solid #e2e8f0;
        }
        
        .resend-section p {
            color: #718096;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .btn-link {
            background: none;
            border: none;
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .btn-link:hover {
            color: #5568d3;
            text-decoration: underline;
        }
        
        .btn-link:disabled {
            color: #cbd5e0;
            cursor: not-allowed;
        }
        
        .timer {
            display: inline-block;
            margin-left: 8px;
            color: #718096;
            font-size: 14px;
        }
        
        .auth-footer {
            text-align: center;
            padding-top: 20px;
        }
        
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #5568d3;
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <div class="video-bg-wrapper">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="https://media.istockphoto.com/id/915283878/video/modern-gym-interior.mp4?s=mp4-640x640-is&k=20&c=ni6j1_f65s2jkxoYIf1_9ctrbPQEuyoTg4lbtQ2pvS0=" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>
    
    <!-- Content -->
    <div class="content-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="icon-circle">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2>Verify OTP</h2>
                <p>Enter the 6-digit code sent to your {{ session.get('reset_delivery_method', 'email') }}</p>
            </div>

            <form method="POST" action="{{ url_for('verify_otp') }}" class="auth-form" id="otpForm">
                <div class="otp-input-group">
                    <input type="text" 
                           class="otp-input" 
                           maxlength="1" 
                           pattern="[0-9]" 
                           inputmode="numeric"
                           required>
                    <input type="text" 
                           class="otp-input" 
                           maxlength="1" 
                           pattern="[0-9]" 
                           inputmode="numeric"
                           required>
                    <input type="text" 
                           class="otp-input" 
                           maxlength="1" 
                           pattern="[0-9]" 
                           inputmode="numeric"
                           required>
                    <input type="text" 
                           class="otp-input" 
                           maxlength="1" 
                           pattern="[0-9]" 
                           inputmode="numeric"
                           required>
                    <input type="text" 
                           class="otp-input" 
                           maxlength="1" 
                           pattern="[0-9]" 
                           inputmode="numeric"
                           required>
                    <input type="text" 
                           class="otp-input" 
                           maxlength="1" 
                           pattern="[0-9]" 
                           inputmode="numeric"
                           required>
                </div>

                <input type="hidden" name="otp_code" id="otpCode">

                <button type="submit" class="btn btn-primary">
                    Verify OTP
                </button>
            </form>

            <div class="resend-section">
                <p>Didn't receive the code?</p>
                <button type="button" class="btn-link" id="resendBtn">
                    Resend OTP
                </button>
                <span class="timer" id="timer"></span>
            </div>

            <div class="auth-footer">
                <a href="{{ url_for('forgot_password') }}" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // Ensure video plays
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('.video-bg');
            if (video) {
                video.play().catch(e => console.log('Autoplay prevented:', e));
            }
        });

        // OTP Input handling
        const otpInputs = document.querySelectorAll('.otp-input');
        const otpForm = document.getElementById('otpForm');
        const otpCodeInput = document.getElementById('otpCode');

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 6);
                pastedData.split('').forEach((char, i) => {
                    if (otpInputs[i]) {
                        otpInputs[i].value = char;
                    }
                });
                if (pastedData.length === 6) {
                    otpInputs[5].focus();
                }
            });
        });

        otpForm.addEventListener('submit', (e) => {
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            otpCodeInput.value = otp;
        });

        // Resend OTP with timer
        let resendTimer;
        let timeLeft = 60;

        function startResendTimer() {
            const resendBtn = document.getElementById('resendBtn');
            const timerSpan = document.getElementById('timer');
            
            resendBtn.disabled = true;
            timeLeft = 60;
            
            resendTimer = setInterval(() => {
                timeLeft--;
                timerSpan.textContent = `(${timeLeft}s)`;
                
                if (timeLeft <= 0) {
                    clearInterval(resendTimer);
                    resendBtn.disabled = false;
                    timerSpan.textContent = '';
                }
            }, 1000);
        }

        document.getElementById('resendBtn').addEventListener('click', function() {
            fetch('{{ url_for("resend_otp") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'OTP Resent',
                        text: data.message,
                        timer: 3000
                    });
                    startResendTimer();
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: data.message
                    });
                }
            });
        });

        // Start timer on page load
        startResendTimer();
    </script>
</body>
</html>
