<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Daily Fitness</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            overflow: hidden;
        }
        
        .video-bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
            padding: 40px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h2 {
            font-size: 28px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            color: #718096;
            font-size: 14px;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 8px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .delivery-options {
            display: flex;
            gap: 12px;
        }
        
        .radio-option {
            flex: 1;
            cursor: pointer;
        }
        
        .radio-option input[type="radio"] {
            display: none;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            transition: all 0.2s;
        }
        
        .radio-option input[type="radio"]:checked + .radio-label {
            border-color: #667eea;
            background: #f7fafc;
            color: #667eea;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .auth-footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            margin-top: 20px;
        }
        
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #5568d3;
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <div class="video-bg-wrapper">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="https://media.istockphoto.com/id/915283878/video/modern-gym-interior.mp4?s=mp4-640x640-is&k=20&c=ni6j1_f65s2jkxoYIf1_9ctrbPQEuyoTg4lbtQ2pvS0=" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>
    
    <!-- Content -->
    <div class="content-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your email to receive an OTP code</p>
            </div>

            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="form-group">
                    <label for="identifier">Email</label>
                    <input type="email" 
                           id="identifier" 
                           name="identifier" 
                           class="form-control" 
                           placeholder="Enter your email"
                           required 
                           autofocus>
                </div>

                <div class="form-group">
                    <label>Delivery Method</label>
                    <div class="delivery-options">
                        <label class="radio-option">
                            <input type="radio" name="delivery_method" value="email" checked>
                            <span class="radio-label">
                                <i class="fas fa-envelope"></i>
                                Email
                            </span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    Send OTP Code
                </button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('index') }}" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Ensure video plays
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('.video-bg');
            if (video) {
                video.play().catch(e => console.log('Autoplay prevented:', e));
            }
        });
    </script>
</body>
</html>
